<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Impossible NO Button</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      font-family:Arial, sans-serif;
      background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffb199);
    }

    .container{
      width:550px;
      height:350px;
      background:white;
      border-radius:25px;
      box-shadow:0 15px 35px rgba(0,0,0,0.25);
      position:relative;
      text-align:center;
      overflow:hidden;
    }

    h1{
      margin-top:40px;
      font-size:42px;
      color:#333;
    }

    button{
      border:none;
      padding:15px 35px;
      font-size:22px;
      border-radius:14px;
      cursor:pointer;
      font-weight:bold;
      transition:0.15s;
      position:absolute;
    }

    #yesBtn{
      background:#4CAF50;
      color:white;
      left:130px;
      top:180px;
    }

    #yesBtn:hover{
      transform:scale(1.08);
      background:#43a047;
    }

    #noBtn{
      background:#ff3b3b;
      color:white;
      left:320px;
      top:180px;
    }

    #message{
      position:absolute;
      bottom:25px;
      width:100%;
      text-align:center;
      font-size:28px;
      font-weight:bold;
      color:#222;
    }
  </style>
</head>
<body>

<div class="container" id="container">
  <h1>Are you a robot?</h1>

  <button id="yesBtn">Yes</button>
  <button id="noBtn">No</button>

  <div id="message"></div>
</div>

<script>
  const noBtn = document.getElementById("noBtn");
  const yesBtn = document.getElementById("yesBtn");
  const container = document.getElementById("container");
  const message = document.getElementById("message");

  // NO button escapes cursor
  document.addEventListener("mousemove", (e) => {

    const rect = noBtn.getBoundingClientRect();

    const btnX = rect.left + rect.width / 2;
    const btnY = rect.top + rect.height / 2;

    const distX = e.clientX - btnX;
    const distY = e.clientY - btnY;

    const distance = Math.sqrt(distX * distX + distY * distY);

    // Mouse gets near button
    if(distance < 170){

      const maxX = container.clientWidth - noBtn.offsetWidth - 10;
      const maxY = container.clientHeight - noBtn.offsetHeight - 10;

      let newX;
      let newY;

      // Keep generating positions far from cursor
      do{
        newX = Math.random() * maxX;
        newY = 120 + Math.random() * (maxY - 120);

      }while(
        Math.abs(newX - (e.clientX - container.offsetLeft)) < 140 &&
        Math.abs(newY - (e.clientY - container.offsetTop)) < 100
      );

      noBtn.style.left = newX + "px";
      noBtn.style.top = newY + "px";

      // Random funny effects
      const rotations = [0, 15, -15, 25, -25, 45, -45];
      const randomRotate = rotations[Math.floor(Math.random() * rotations.length)];

      noBtn.style.transform = `rotate(${randomRotate}deg)`;

      // Random resize
      const randomScale = 0.7 + Math.random() * 0.8;
      noBtn.style.scale = randomScale;

      // Random text
      const texts = [
        "No",
        "NOPE",
        "Try Again",
        "Missed",
        "Catch Me",
        "Too Slow",
        "Nah"
      ];

      noBtn.innerText = texts[Math.floor(Math.random() * texts.length)];
    }
  });

  // Prevent TAB focus cheating
  noBtn.addEventListener("focus", () => {
    noBtn.blur();
  });

  // YES clicked
  yesBtn.addEventListener("click", () => {
    message.innerHTML = "I KNEW IT 😂";
  });

  // If somehow clicked
  noBtn.addEventListener("click", (e) => {
    e.preventDefault();

    noBtn.style.left = Math.random() * 400 + "px";
    noBtn.style.top = 140 + Math.random() * 150 + "px";
  });
</script>

</body>
</html>
